<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraRank Ultimate FULL</title>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:#fff;
  transition:1s;
  background:
    radial-gradient(circle at top,#1a0033 0%,transparent 40%),
    radial-gradient(circle at bottom,#001a33 0%,transparent 40%),
    #05060a;
}

body.god{
  background:
    radial-gradient(circle at top,#00fff7 0%,transparent 40%),
    radial-gradient(circle at bottom,#7c5cff 0%,transparent 40%),
    #000;
}

body.legend{
  background:
    radial-gradient(circle at top,#ffcc00 0%,transparent 40%),
    radial-gradient(circle at bottom,#ff0066 0%,transparent 40%),
    #05060a;
}

.app{
  max-width:420px;
  margin:auto;
  padding:16px;
}

.header{
  text-align:center;
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(0,255,255,0.1);
  backdrop-filter: blur(10px);
  transition:.2s;
}

#avatar{
  font-size:80px;
  transition:.3s;
}

.avatarFX{animation:pop .35s;}

@keyframes pop{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

.aura{font-size:2rem;color:#00fff7;font-weight:700;}
.rank{color:#ff4dff;}
.level{color:#aaa;}

.progress{
  height:8px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00fff7,#7c5cff,#ff4dff);
  transition:.3s;
}

.card{
  margin-top:14px;
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(0,255,255,0.08);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-weight:bold;
  background:linear-gradient(90deg,#7c5cff,#00fff7);
  color:white;
}

.rarity{
  margin-top:8px;
  font-size:.85rem;
}

.common{color:#aaa;}
.rare{color:#4da3ff;}
.epic{color:#b84dff;}
.legendary{
  color:#ffd700;
  text-shadow:0 0 10px #ffd700;
}
.mythic{
  color:#ff4d6d;
  text-shadow:0 0 12px #ff4d6d;
}

.float{
  position:fixed;
  left:50%;
  top:45%;
  transform:translateX(-50%);
  font-size:3rem;
  opacity:0;
  transition:.3s;
}

.float.show{
  opacity:1;
  transform:translate(-50%,-80px);
}

.skins{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.skin{
  font-size:2rem;
  opacity:.5;
  cursor:pointer;
  transition:.2s;
}

.skin.active{
  opacity:1;
  transform:scale(1.4);
  filter:drop-shadow(0 0 10px #00fff7);
}

</style>
</head>

<body>

<div class="app">

<div class="header" id="header">
  <div id="avatar">😐</div>
  <div class="aura" id="aura">0 ✨</div>
  <div class="rank" id="rank">Iniciante</div>
  <div class="level" id="level">Nível 1</div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
</div>

<div class="card">
  <button onclick="newQuest()"> Nova missão</button>
  <button onclick="completeQuest()"> Completar missão</button>
  <button onclick="lootBox()"> Loot Box</button>

  <div id="qTitle"></div>
  <div id="qDesc"></div>
  <div id="rarity" class="rarity"></div>
</div>

<div class="card">
  <h3> Skins</h3>
  <div class="skins" id="skins"></div>
</div>

<div class="card">
  <h3>🏆 Ranking</h3>
  <div id="board"></div>
</div>

</div>

<div class="float" id="float"></div>

<script>

// ================= STATE =================
let aura = Number(localStorage.getItem("aura") || 0);
let skin = localStorage.getItem("skin") || "😐";

let baseSkins = [
"😐","😎","🔥","💀","👑","🌌","💎","🚀","🧠","🔮","⚡","🌀",
"🍌💦","🛸","👀","☣","👤","🤯","🔎","📜","🇧🇷","🛡","🏹","🗡",
"🐉","🦊","🐺","⚔️","🦈","🐍","🐙","🦾","🦿","👾",
"💠","🎸","🐏","😵","😈","🦖","💾","🫡","☠️","🤖",
"☀","🌙","⭐","🌟","🥚","🌪","🍩","❄","💫",
"🧊","🌊","🌋","🪐","🌍","🌑","🗿","🧬",
"⚙","🔧","🔩","🧲","📡","🛰","💻",
"💰","🎯","🎲","🎮","🕹","🧩","🏆","🥇","🥈","🥉igorbeta"
];

let skins = JSON.parse(localStorage.getItem("skins") || "null");
if(!skins) skins = baseSkins.slice();

let current = null;

// ================= AUDIO =================
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function beep(f,d){
 let o=ctx.createOscillator();
 let g=ctx.createGain();
 o.connect(g);g.connect(ctx.destination);
 o.frequency.value=f;
 o.start();
 g.gain.setValueAtTime(0.2,ctx.currentTime);
 g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d);
 o.stop(ctx.currentTime+d);
}

function vib(ms){if(navigator.vibrate) navigator.vibrate(ms);}

// ================= RANK =================
function getRank(a){
 if(a<2000) return "🥉 Iniciante";
 if(a<50000) return "🥈 Jogador";
 if(a<100000) return "🥇 Mestre";
 if(a<2000000) return "💎 Elite";
 return "👑 Transcendente";
}

// ================= QUEST =================
const actions=["ignorar","sumir","controlar","ghostar","analisar","quebrar padrão","moggar"];
const places=["chat","betas","grupo","call","vida real"];

function roll(){
 let r=Math.random();
 if(r<0.5) return "common";
 if(r<0.75) return "rare";
 if(r<0.9) return "epic";
 if(r<0.97) return "legendary";
 return "mythic";
}

function gen(){
 return {
  t:`⚡ ${actions[Math.random()*actions.length|0]} ${places[Math.random()*places.length|0]}`,
  d:"farme muita aura",
  a:20+Math.random()*80|0,
  r:roll()
 };
}

// ================= QUEST =================
function newQuest(){
 current=gen();
 qTitle.innerText=current.t;
 qDesc.innerText=current.d;
 rarity.innerText=current.r.toUpperCase();
 rarity.className="rarity "+current.r;
}

// ================= COMPLETE =================
function completeQuest(){
 if(!current)return;
 aura+=current.a;
 drop();
 shake();
 vib(50);
 update();
 if(current.r==="mythic")beep(900,0.2);
 else if(current.r==="legendary")beep(700,0.15);
 else beep(300,0.08);
}

// ================= DROP =================
function drop(){
 let item=baseSkins[Math.random()*baseSkins.length|0];
 float.innerText="✨ "+item;
 float.classList.add("show");
 setTimeout(()=>float.classList.remove("show"),600);
 if(!skins.includes(item)){
  skins.push(item);
  aura+=15;
  vib(40);
  beep(700,0.08);
 }
}

// ================= LOOT =================
function lootBox(){
 let item=baseSkins[Math.random()*baseSkins.length|0];
 aura+=50;
 if(!skins.includes(item))skins.push(item);
 vib(120);
 beep(600,0.12);
 update();
}

// ================= FX =================
function shake(){
 header.style.transform="translateX(-4px)";
 setTimeout(()=>header.style.transform="translateX(4px)",80);
 setTimeout(()=>header.style.transform="translateX(0px)",160);
}

function avatarFX(){
 avatar.classList.add("avatarFX");
 setTimeout(()=>avatar.classList.remove("avatarFX"),350);
}

// ================= SKINS =================
function renderSkins(){
 skinsDiv.innerHTML="";
 skins.forEach(s=>{
  let e=document.createElement("span");
  e.innerText=s;
  e.className="skin"+(s===skin?" active":"");
  e.onclick=()=>{
   skin=s;
   avatarFX();
   update();
  };
  skinsDiv.appendChild(e);
 });
}

// ================= UPDATE =================
function update(){

 let lvl=Math.floor(aura/100)+1;

 // secret skins
 if(aura>300&&!skins.includes("🌌"))skins.push("🌌");
 if(aura>200000&&!skins.includes("👑"))skins.push("👑");
 if(aura>1000&&!skins.includes("⚡"))skins.push("⚡");
 if(aura>1500&&!skins.includes("🧠"))skins.push("🧠");
 if(aura>2500&&!skins.includes("💠"))skins.push("💠");

 auraEl.innerText=aura+" ✨";
 level.innerText="Nível "+lvl;
 rank.innerText=getRank(aura);
 bar.style.width=(aura%100)+"%";
 avatar.innerText=skin;

 // backgrounds
 document.body.classList.remove("god","legend");
 if(aura>2000)document.body.classList.add("god");
 else if(aura>800)document.body.classList.add("legend");

 localStorage.setItem("aura",aura);
 localStorage.setItem("skin",skin);
 localStorage.setItem("skins",JSON.stringify(skins));

 renderSkins();
 board();
}

// ================= BOARD =================
function board(){
 let list=[
  {n:"NeonX",a:999999},
  {n:"Void",a:5000},
  {n:"You",a:aura},
  {n:"Shadow",a:3000}
 ];
 boardDiv.innerHTML=list.sort((a,b)=>b.a-a.a)
 .map(x=>"⚡ "+x.n+" - "+x.a)
 .join("<br>");
}

// INIT refs
const avatar=document.getElementById("avatar");
const auraEl=document.getElementById("aura");
const rank=document.getElementById("rank");
const level=document.getElementById("level");
const bar=document.getElementById("bar");
const skinsDiv=document.getElementById("skins");
const boardDiv=document.getElementById("board");
const header=document.getElementById("header");
const float=document.getElementById("float");
const qTitle=document.getElementById("qTitle");
const qDesc=document.getElementById("qDesc");
const rarity=document.getElementById("rarity");

// INIT
update();

</script>
<div class="card">
  <h3>🔐 Código secreto</h3>

  <input id="secretCode" placeholder="Digite o código..."
    style="width:100%;padding:12px;border-radius:10px;border:none;outline:none;margin-top:8px;">

  <button onclick="checkSecret()">Ativar</button>

  <div id="secretMsg" style="margin-top:8px;font-size:.9rem;opacity:.8;"></div>
</div>

<script>

// 🔥 controle global
window.ADM = false;

function checkSecret(){
  const v = document.getElementById("secretCode").value.trim().toUpperCase();
  const msg = document.getElementById("secretMsg");

  if(v === "CHICOGAVIÃO"){

    // 💥 ativa modo ADM
    window.ADM = true;

    // 💥 aura infinita REAL
    aura = Number.MAX_SAFE_INTEGER;

    // 🎨 fundo marrom estilizado
    document.body.style.background = `
      radial-gradient(circle at top, #6b3b1f 0%, transparent 55%),
      radial-gradient(circle at bottom, #2a140a 0%, transparent 55%),
      #120805
    `;

    // 🔥 avatar ADM fixo
    const avatar = document.getElementById("avatar");
    avatar.innerText = "🔥LUIKI457";

    // ✨ efeito
    const header = document.getElementById("header");
    header.style.boxShadow = "0 0 40px rgba(255,255,255,0.6)";
    header.style.transform = "scale(1.05)";

    msg.innerText = "🔥 CHICOGAVIÃO ATIVADO";

    update();

  } else {
    msg.innerText = "❌ código inválido";
  }
}
function update(){

 let lvl=Math.floor(aura/100)+1;

 auraEl.innerText=aura+" ✨";
 level.innerText="Nível "+lvl;
 rank.innerText=getRank(aura);
 bar.style.width=(aura%100)+"%";

 // 🔥 NÃO SOBRESCREVE ADM
 if(!window.ADM){
   avatar.innerText=skin;
 }

 localStorage.setItem("aura",aura);
}
</script>
</body>
</html>
